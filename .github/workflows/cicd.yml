name: E-commerce GCP Data Pipeline CICD

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'images/**'

env:
  GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
  TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_environment: "prod"
  TF_VAR_gcp_region: "asia-southeast1"

jobs:
  # -----------------------------------------------------
  # STAGE 1: CODE VALIDATION (CI)
  # -----------------------------------------------------
  code-validation:
    name: "Linting & Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Flake8 Check
        run: |
          pip install flake8
          flake8 scripts/ dags/ --max-line-length=200 --ignore=E203,W503,E128,E124,E305,W291,W391,E302,E303,W293,F403,F405,W292,E127,E131,E126

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Check
        run: |
          cd terraform
          terraform init
          terraform validate
          terraform plan -out=tfplan

  # -----------------------------------------------------
  # STAGE 2: INFRASTRUCTURE DEPLOYMENT (CD - TERRAFORM)
  # -----------------------------------------------------
  deploy-infra:
    name: "Terraform Deploy"
    runs-on: ubuntu-latest
    needs: code-validation 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform 
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

  # -----------------------------------------------------
  # STAGE 3: DAGS & SCRIPTS DEPLOYMENT (CD - GCP)
  # -----------------------------------------------------
  deploy-app:
    name: "Deploy DAGs, Scripts, and Compose Config"
    runs-on: ubuntu-latest
    needs: deploy-infra 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 🌟 สเตปเพิ่มใหม่: ส่งพิมพ์เขียว docker-compose ขึ้นไปอัปเดตบน GCS
      - name: Upload Docker Compose Config to GCS
        run: |
          gcloud storage cp docker-compose.yml gs://ecommerce-customer-behavior-2026-prod/config/

      - name: Upload PySpark Scripts to GCS
        run: |
          gcloud storage cp scripts/*.py gs://ecommerce-customer-behavior-2026-prod/scripts/

      - name: Upload DAGs to GCS (Staging)
        run: |
          gcloud storage cp dags/*.py gs://ecommerce-customer-behavior-2026-prod/dags/

      # 🌟 สเตปปรับปรุงใหม่: สั่งให้ VM ดึงไฟล์ล่าสุดทั้งสองตัว แล้วสั่งรันซ้ำแบบปลอดภัย (Idempotent)
      - name: Sync Config & DAGs to Airflow VM
        run: |
          gcloud compute ssh chantakorn_chw@ecommerce-airflow-vm-prod \
            --zone="us-east1-b" \
            --command="
              gcloud storage cp gs://ecommerce-customer-behavior-2026-prod/config/docker-compose.yml ~/airflow/ && \
              gcloud storage cp gs://ecommerce-customer-behavior-2026-prod/dags/*.py ~/airflow/dags/ && \
              cd ~/airflow && \
              sudo docker-compose up -d
            " \
            --quiet